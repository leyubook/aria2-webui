<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aria2 Plus 全栈可视化管理中心</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">A2+</span>
          <div>
            <h1>Aria2 Plus</h1>
            <p>Web UI + 本地 API Server 一体化管理中心</p>
          </div>
        </div>
        <nav class="nav-tabs">
          <button class="nav-tab active" data-view="smart">智能监控</button>
          <button class="nav-tab" data-view="tasks">任务面板</button>
          <button class="nav-tab" data-view="files">网盘文件浏览</button>
          <button class="nav-tab" data-view="settings">系统设置</button>
        </nav>
        <div class="topbar-actions">
          <span id="socketState" class="status-pill idle">WS 连接中</span>
          <button id="themeToggle" class="ghost-button">切换主题</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="column column-left">
          <section class="panel accent-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">智能任务下发</span>
                <h2>添加任务入口</h2>
              </div>
            </div>
            <form id="addTaskForm" class="stack-form">
              <label>
                <span>磁力 / 种子链接</span>
                <textarea
                  id="taskUri"
                  name="uri"
                  rows="5"
                  placeholder="粘贴 magnet:? 或 .torrent URL / 本地 torrent 文件路径"
                  required
                ></textarea>
              </label>
              <label>
                <span>文件名提示（可选）</span>
                <input
                  id="filenameHint"
                  name="filename_hint"
                  type="text"
                  placeholder="磁力缺少 dn 参数时可手工输入"
                />
              </label>
              <div class="inline-actions">
                <button type="submit" class="primary-button">智能去重并下发</button>
                <button type="button" id="forceAddButton" class="ghost-button">忽略去重强制下发</button>
              </div>
            </form>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">远程存量探测器</span>
                <h2>Rclone 网盘总览</h2>
              </div>
              <div class="inline-actions">
                <button id="scanWebdavButton" class="primary-button">扫描 WebDAV</button>
                <button id="refreshLocalButton" class="ghost-button">刷新本地</button>
              </div>
            </div>
            <div class="meta-row">
              <span id="scanMeta">尚未扫描远端</span>
            </div>
            <div class="split-tabs">
              <button class="mini-tab active" data-explorer="remote">远程文件树</button>
              <button class="mini-tab" data-explorer="local">本地面板</button>
            </div>
            <div id="remoteExplorer" class="explorer active"></div>
            <div id="localExplorer" class="explorer"></div>
          </section>
        </aside>

        <section class="column column-center">
          <section class="panel hero-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">作业队列与进度看板</span>
                <h2>实时状态总览</h2>
              </div>
            </div>
            <div id="statsGrid" class="stats-grid"></div>
            <div id="healthGrid" class="health-grid"></div>
          </section>

          <section id="view-smart" class="panel view-panel active">
            <div class="panel-header">
              <div>
                <span class="eyebrow">下载 / 搬运联动</span>
                <h2>智能监控视图</h2>
              </div>
            </div>
            <div id="smartBoard" class="lane-grid"></div>
          </section>

          <section id="view-tasks" class="panel view-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">Aria2 实时任务卡片</span>
                <h2>任务面板</h2>
              </div>
            </div>
            <div id="taskList" class="task-list"></div>
          </section>

          <section id="view-files" class="panel view-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">网盘去重 / 深层校验</span>
                <h2>远端文件列表</h2>
              </div>
            </div>
            <div id="remoteTable" class="data-table"></div>
          </section>

          <section id="view-settings" class="panel view-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">运行配置</span>
                <h2>系统设置</h2>
              </div>
            </div>
            <form id="settingsForm" class="settings-grid">
              <label>
                <span>Aria2 RPC URL</span>
                <input name="aria2_rpc_url" type="text" />
              </label>
              <label>
                <span>Aria2 RPC Secret</span>
                <input name="aria2_rpc_secret" type="password" />
              </label>
              <label>
                <span>Rclone 可执行文件</span>
                <input name="rclone_binary" type="text" />
              </label>
              <label>
                <span>Rclone Remote</span>
                <input name="rclone_remote" type="text" />
              </label>
              <label>
                <span>Remote 子目录</span>
                <input name="rclone_remote_path" type="text" />
              </label>
              <label>
                <span>本地下载目录</span>
                <input name="download_dir" type="text" />
              </label>
              <label>
                <span>扫描深度</span>
                <input name="webdav_scan_depth" type="number" min="1" max="20" />
              </label>
              <label>
                <span>扫描缓存 TTL</span>
                <input name="webdav_scan_ttl_seconds" type="number" min="10" max="3600" />
              </label>
              <label>
                <span>Aria2 轮询间隔</span>
                <input name="aria2_poll_interval_seconds" type="number" min="1" max="30" />
              </label>
              <label>
                <span>API Host</span>
                <input name="api_host" type="text" />
              </label>
              <label>
                <span>API Port</span>
                <input name="api_port" type="number" min="1" max="65535" />
              </label>
              <label>
                <span>Hook Token</span>
                <input name="hook_token" type="password" />
              </label>
              <label>
                <span>API Token（可选，留空则不启用认证）</span>
                <input name="api_token" type="password" />
              </label>
              <div class="form-actions">
                <button type="submit" class="primary-button">保存设置</button>
              </div>
            </form>
          </section>
        </section>

        <aside class="column column-right">
          <section class="panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">手动干预扳机</span>
                <h2>异常作业</h2>
              </div>
            </div>
            <div id="attentionPanel" class="attention-list"></div>
          </section>

          <section class="panel console-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">操作日志控制台</span>
                <h2>Rclone / Aria2 输出</h2>
              </div>
            </div>
            <div id="logConsole" class="log-console"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="feedbackDialog" class="feedback-dialog">
      <div id="dialogBody"></div>
      <form method="dialog">
        <button class="primary-button">知道了</button>
      </form>
    </dialog>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
